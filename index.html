<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vlog Route Studio</title>
<style>
  :root {
    --paper: #f7f3ea;
    --ink: #171512;
    --muted: #71695e;
    --line: rgba(23, 21, 18, 0.13);
    --card: #fffdf7;
    --brick: #b35f3b;
    --blue: #2f6f89;
    --olive: #667b43;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    background:
      linear-gradient(90deg, rgba(23, 21, 18, 0.035) 1px, transparent 1px),
      linear-gradient(180deg, rgba(23, 21, 18, 0.035) 1px, transparent 1px),
      var(--paper);
    background-size: 38px 38px;
  }

  a { color: inherit; }

  .shell {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
    padding: 36px 0 48px;
  }

  header {
    min-height: 40vh;
    display: grid;
    align-content: end;
    gap: 16px;
    padding: 28px 0;
    border-bottom: 1px solid var(--line);
  }

  .kicker {
    width: fit-content;
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 253, 247, 0.72);
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1 {
    max-width: 760px;
    margin: 0;
    font-family: "STSong", "Songti SC", "Noto Serif CJK SC", serif;
    font-size: clamp(42px, 8vw, 92px);
    line-height: 0.96;
    letter-spacing: 0;
  }

  header p {
    max-width: 680px;
    margin: 0;
    color: var(--muted);
    font-size: 17px;
    line-height: 1.7;
  }

  .destinations {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    padding-top: 22px;
  }

  .destination {
    min-height: 260px;
    display: grid;
    align-content: end;
    gap: 12px;
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(160deg, rgba(255,255,255,0.02), rgba(255,255,255,0.72)),
      var(--card);
    text-decoration: none;
    box-shadow: 0 20px 60px rgba(54, 45, 30, 0.12);
    transition: transform 160ms ease, border-color 160ms ease;
  }

  .destination:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--brick), transparent 40%);
  }

  .destination .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .pill {
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
  }

  .destination h2 {
    margin: 0;
    font-family: "STSong", "Songti SC", "Noto Serif CJK SC", serif;
    font-size: 34px;
    line-height: 1.05;
  }

  .destination p {
    margin: 0;
    color: var(--muted);
    line-height: 1.6;
  }

  .coming-soon {
    opacity: 0.64;
    pointer-events: none;
  }

  @media (max-width: 640px) {
    .shell {
      width: min(100% - 24px, 1120px);
      padding-top: 20px;
    }

    header {
      min-height: 34vh;
    }

    .destination {
      min-height: 220px;
    }
  }
</style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="kicker">Vlog Route Studio</div>
      <h1>旅行拍摄路线库</h1>
      <p>每个城市都是一套可复用的拍摄工作台：地图路线、真实照片、镜头清单和口播备注都放在同一个地方，手机打开就能边走边写。</p>
    </header>

    <section class="destinations" aria-label="目的地">
      <a class="destination" href="./dubai/">
        <div class="meta">
          <span class="pill">Dubai</span>
          <span class="pill">4 days</span>
          <span class="pill">15 stops</span>
        </div>
        <h2>迪拜 Vlog 拍摄路线</h2>
        <p>老迪拜、城市核心、奢华海岸和沙漠 Safari，一套完整的 4 日拍摄指挥台。</p>
      </a>

      <article class="destination coming-soon">
        <div class="meta">
          <span class="pill">Next</span>
          <span class="pill">Template Ready</span>
        </div>
        <h2>下一个目的地</h2>
        <p>以后可以继续添加东京、巴黎、曼谷或任何新的城市路线。</p>
      </article>
    </section>
  </main>
</body>
</html>
