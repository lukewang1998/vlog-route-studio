<style>
:root{--paper:#f7f3ea;--panel:#fffdf7;--ink:#171512;--muted:#70685d;--line:rgba(23,21,18,.14);--shadow:0 20px 70px rgba(23,21,18,.22);--d1:#b58a2e;--d2:#2f6f89;--d3:#67558d;--d4:#687c42}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Avenir Next,PingFang SC,Microsoft YaHei,sans-serif;color:var(--ink);background:var(--paper)}button,input,textarea{font:inherit}button{border:0;cursor:pointer;color:inherit}a{color:inherit}.app{min-height:100dvh;display:grid;grid-template-rows:auto 1fr}.top{position:sticky;top:0;z-index:30;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);background:rgba(255,253,247,.94);backdrop-filter:blur(16px)}h1{margin:0;font-family:STSong,Songti SC,serif;font-size:clamp(23px,4vw,38px);line-height:1.05}.sub{margin:5px 0 0;color:var(--muted);font-size:13px}.tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.tab{min-height:38px;padding:7px 11px;border-radius:8px;background:#eee7da;color:var(--muted);font-weight:800;font-size:12px}.tab.active{background:var(--tone);color:#fff}.main{min-height:0;display:grid;grid-template-columns:minmax(360px,31vw) 1fr}.side{min-height:0;overflow:auto;border-right:1px solid var(--line);background:rgba(255,253,247,.82)}.brief{padding:18px;border-bottom:1px solid var(--line)}.brief b{display:block;color:var(--tone);font-size:12px;letter-spacing:.08em;text-transform:uppercase}.brief h2{margin:7px 0 5px;font-family:STSong,Songti SC,serif;font-size:25px}.brief p{margin:0;color:var(--muted);line-height:1.55;font-size:13px}.cards{padding:12px}.stop{display:grid;grid-template-columns:34px 1fr;gap:12px;padding:13px;margin-bottom:10px;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:0 1px 0 rgba(255,255,255,.8)}.stop.active{border-color:var(--tone);box-shadow:0 16px 45px rgba(23,21,18,.14)}.pin{width:34px;height:34px;display:grid;place-items:center;border-radius:50%;background:var(--tone);color:#fff;font-weight:900}.meta{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}.stop h3{margin:4px 0 2px;font-family:STSong,Songti SC,serif;font-size:18px}.en{color:var(--muted);font-size:12px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}.chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.chip{padding:3px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:11px}.note{margin:8px 0 0;padding-left:10px;border-left:3px solid var(--tone);font-size:13px;line-height:1.6}.shots{display:grid;gap:6px;margin-top:10px}.shot{display:grid;grid-template-columns:18px 1fr;gap:7px;color:var(--muted);font-size:12px;line-height:1.45}.shot input{appearance:none;width:16px;height:16px;margin:1px 0 0;border:1.5px solid var(--tone);border-radius:4px}.shot input:checked{background:var(--tone)}.shot input:checked:after{content:'';display:block;width:4px;height:8px;margin:1px 0 0 5px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(40deg)}.shot.done span{text-decoration:line-through;opacity:.55}.script{display:grid;gap:6px;margin-top:12px}.script label{color:var(--muted);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.script textarea{width:100%;min-height:86px;resize:vertical;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff;line-height:1.55;outline:0}.script textarea:focus{border-color:var(--tone);box-shadow:0 0 0 3px color-mix(in srgb,var(--tone),transparent 84%)}.saved{color:#999;font-size:11px}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.link{padding:6px 10px;border:1px solid var(--line);border-radius:8px;text-decoration:none;color:var(--muted);font-size:12px;background:#fff}.mapwrap{position:relative;min-width:0;min-height:0;background:#ddd4c7}#map{width:100%;height:100%}.leaflet-container{font-family:Avenir Next,PingFang SC,sans-serif}.marker{width:34px;height:34px;display:grid;place-items:center;border-radius:50% 50% 50% 8px;background:var(--tone);color:#fff;border:2px solid #fff;box-shadow:0 8px 20px rgba(0,0,0,.25);transform:rotate(-45deg)}.marker span{transform:rotate(45deg);font-weight:900}.detail{position:absolute;left:18px;bottom:18px;z-index:900;width:min(440px,calc(100% - 36px));max-height:calc(100% - 36px);display:none;grid-template-rows:220px minmax(0,1fr) auto;overflow:hidden;border-radius:8px;background:#fff;box-shadow:var(--shadow)}.detail.open{display:grid}.photo{position:relative;background:#ddd}.photo img{width:100%;height:100%;object-fit:cover;display:block}.close{position:absolute;top:12px;right:12px;width:42px;height:42px;border-radius:8px;background:rgba(255,255,255,.9);font-size:30px;line-height:1}.body{overflow:auto;padding:18px 20px}.body h3{margin:10px 0 6px;font-size:29px;line-height:1.15}.rating{display:flex;gap:8px;flex-wrap:wrap;color:#3b352d;font-weight:700}.rating span{color:var(--muted);font-weight:500}.box{margin-top:16px;padding:14px;border-radius:8px;background:#f4f1ec}.box b{display:block;margin-bottom:7px;color:var(--muted);font-weight:600}.box p{margin:0;line-height:1.65}.mini{display:grid;gap:8px;margin-top:15px;padding-top:14px;border-top:1px solid var(--line);font-size:13px;color:#3d382f}.nav{display:grid;grid-template-columns:54px 1fr 54px;align-items:center;gap:10px;padding:11px 18px;border-top:1px solid var(--line);background:#fff}.nav button{width:46px;height:46px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:28px}.count{text-align:center;font-weight:800}.mobile-map{display:none;position:fixed;right:14px;bottom:14px;z-index:1000;padding:11px 14px;border-radius:999px;background:var(--ink);color:#fff;box-shadow:var(--shadow)}@media(max-width:860px){body{overflow:auto}.app{display:block}.top{display:block}.tabs{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;margin-top:12px}.tab{flex:0 0 auto}.main{display:block}.side{border-right:0}.mapwrap{height:58dvh;display:none}.detail{left:10px;right:10px;bottom:10px;width:auto;max-height:calc(58dvh - 20px);grid-template-rows:42% minmax(0,1fr) auto}.map-open .mapwrap{display:block;position:fixed;inset:0;z-index:850}.map-open .side,.map-open .top{display:none}.mobile-map{display:block}.map-open .mobile-map{background:#fff;color:var(--ink)}}
</style>

<body>
<div class='app'>
<header class='top'>
  <div><h1>迪拜 Vlog 拍摄路线</h1><p class='sub'>4 日 · 15 个点位 · 真实图片卡片 · 口播备注自动保存</p></div>

</header>

    <div class='brief' id='brief'></div>
    <div class='cards' id='cards'></div>
  </section>
  <section class='mapwrap'>
    <div id='map'></div>
    <article class='detail' id='detail'></article>
  </section>
</main>
<button class='mobile-map' id='mobileMap'>查看地图</button>
</div>

const img=n=>'https://commons.wikimedia.org/wiki/Special:FilePath/'+n+'?width=900';
const places=[
{id:'d1-alfahidi',day:1,num:1,time:'07:00',dur:'60分钟',lat:25.2642,lng:55.3003,name:'Al Fahidi 历史街区',en:'Al Fahidi Historical Neighbourhood',rating:'4.6',reviews:'16,768',tag:'Historical Landmark',image:img('Al%20Bastakiya%20of%20Dubai.jpg'),note:'黄金拍摄时间！早晨光线柔和，人少，风塔建筑和窄巷最适合做反差开场。',shots:['仰拍风塔建筑','Overhead 视角走小巷','光影打在白墙的静态镜头'],maps:'https://maps.google.com/?cid=6100264283787384830',site:'https://dubaiculture.gov.ae'},
{id:'d1-abra',day:1,num:2,time:'08:30',dur:'30分钟',lat:25.2667,lng:55.2969,name:'迪拜溪 Abra 渡轮',en:'Dubai Creek Abra',rating:'4.7',reviews:'791',tag:'Ferry',image:img('Abra,%20Deira,%20Dubai%20(8971225063).jpg'),note:'1 迪拉姆木船渡轮，水面视角拍两岸老建筑，是非常好用的 B-roll。',shots:['上船瞬间和水面波纹','对岸建筑 wide shot','船夫特写，先礼貌询问'],maps:'https://maps.google.com/?cid=3846505235545775153'},
{id:'d1-goldsouk',day:1,num:3,time:'09:30',dur:'60分钟',lat:25.27,lng:55.2981,name:'迪拜黄金市场',en:'Dubai Gold Souk',rating:'4.4',reviews:'10,418',tag:'Market',image:img('Dubai%20Gold%20Souk%20on%2031%20May%202007%20Pict%201.jpg'),note:'金光闪闪的橱窗是天然摄影棚，反光、重复元素和透视线都很好拍。',shots:['橱窗金饰特写','走廊透视线构图','人流和商贩 street shot'],maps:'https://www.google.com/maps/search/?api=1&query=Dubai+Gold+Souk'},
{id:'d1-spicesouk',day:1,num:4,time:'10:30',dur:'30分钟',lat:25.2676,lng:55.2964,name:'香料市场',en:'Dubai Spice Souk',rating:'4.3',reviews:'6,511',tag:'Market',image:img('Dubai%20Spice%20Souk%202018.jpg'),note:'藏红花、肉桂、香草和大麻袋的堆叠色彩，非常适合做感官转场。',shots:['香料堆叠色彩特写','大麻袋 overhead 俯拍','市场氛围 wide shot'],maps:'https://www.google.com/maps/search/?api=1&query=Dubai+Spice+Souk'},
{id:'d1-frame',day:1,num:5,time:'17:00',dur:'90分钟',lat:25.2355,lng:55.3003,name:'迪拜画框',en:'Dubai Frame',rating:'4.6',reviews:'72,687',tag:'Monument',image:'https://en.wikipedia.org/wiki/Special:FilePath/Dubai_Frame_in_Dubai,_United_Arab_Emirates.jpg?width=900',note:'一边是老迪拜，一边是现代天际线，是讲城市双面性的绝佳场景。',shots:['画框正面对称构图','玻璃地板向下俯拍','左老城右新城的分屏感镜头'],maps:'https://www.google.com/maps/search/?api=1&query=Dubai+Frame'},
{id:'d2-burj',day:2,num:1,time:'08:00',dur:'日间',lat:25.1972,lng:55.2744,name:'哈利法塔',en:'Burj Khalifa',rating:'4.7',reviews:'170,178',tag:'Landmark',image:img('Burj%20Khalifa%20(16286187445).jpg'),note:'蓝调时刻最适合拍塔身。登顶票建议提前买，减少现场排队。',shots:['蓝调时刻塔身全景','仰拍塔尖消失点','登顶俯瞰城市夜景'],maps:'https://maps.google.com/?cid=18394360053605775330',site:'https://www.burjkhalifa.ae/'},

{id:'d2-fountain',day:2,num:3,time:'18:30',dur:'夜间',lat:25.1952,lng:55.2752,name:'迪拜音乐喷泉',en:'The Dubai Fountain',rating:'4.8',reviews:'138,459',tag:'Free Show',image:img('Dubai%20Fountain.jpg'),note:'每 30 分钟一场。湖对岸可以把哈利法塔和喷泉一起收进画面。',shots:['湖对岸广角：塔和喷泉全景','慢门拍水柱，需三脚架','人群反应 cutaway'],maps:'https://maps.google.com/?cid=4502866564103614152'},
{id:'d3-jumeirah',day:3,num:1,time:'08:30',dur:'60分钟',lat:25.194,lng:55.2316,name:'Jumeirah 海滩',en:'Jumeirah Beach',rating:'4.6',reviews:'6,751',tag:'Beach',image:img('Dubai%20Jumeirah%20Beach.JPG'),note:'早晨人少，前景海浪加背景帆船酒店，是经典免费机位。',shots:['海浪前景和帆船远景','沿海滩走路 walk-and-talk','慢门海浪 B-roll'],maps:'https://www.google.com/maps/search/?api=1&query=Jumeirah+Beach+Dubai'},
{id:'d3-burjalarab',day:3,num:2,time:'09:30',dur:'外景免费',lat:25.1412,lng:55.1852,name:'帆船酒店',en:'Jumeirah Burj Al Arab',rating:'4.7',reviews:'30,782',tag:'Hotel',image:img('Burj%20Al-Arab%20(13996844503).jpg'),note:'进入酒店需预约消费；不进去也能在外部拍完整帆型建筑。',shots:['正门前方对称构图','入口车道走近镜头','可选 Skyview Bar 日落'],maps:'https://maps.google.com/?cid=12959795914845773880',site:'https://www.jumeirah.com'},
{id:'d3-view',day:3,num:3,time:'10:30',dur:'10:00开放',lat:25.1142,lng:55.1394,name:'棕榈岛观景台',en:'The View at The Palm',rating:'4.7',reviews:'22,326',tag:'Observation Deck',image:img('The%20Palm%20Jumeirah%20(12618650415).jpg'),note:'公共视角里最适合俯瞰棕榈岛叶脉形状，画面比常规地标更独特。',shots:['棕榈叶脉形状俯拍','帆船酒店和海湾全景','玻璃幕墙人像'],maps:'https://www.google.com/maps/search/?api=1&query=The+View+at+The+Palm'},
{id:'d3-atlantis',day:3,num:4,time:'12:30',dur:'60分钟',lat:25.1304,lng:55.1171,name:'亚特兰蒂斯 / 棕榈岛顶端',en:'Atlantis The Palm',rating:'4.7',reviews:'101,776',tag:'Resort',image:img('Atlantis,%20The%20Palm%20from%20Le%20Royal%20M%C3%A9ridien%20Beach%20Resort%20and%20Spa%20in%20Dubai%203.jpg'),note:'Palm Monorail 车窗可以俯拍棕榈全貌，亚特兰蒂斯正门适合对称构图。',shots:['Monorail 车窗俯拍棕榈全貌','正门对称 wide shot','可选海湾游泳或水上乐园'],maps:'https://maps.google.com/?cid=402045504285854405'},
{id:'d3-marina',day:3,num:5,time:'15:00',dur:'日落前后',lat:25.0856,lng:55.1478,name:'迪拜码头',en:'Dubai Marina Walk',rating:'4.7',reviews:'28,315',tag:'Waterfront',image:img('Dubai%20Marina%20Skyline%2093.jpg'),note:'高楼倒映在水面，游艇穿梭，是最有现代迪拜生活感的段落。',shots:['游艇和高楼倒影','日落水面逆光镜头','夜间霓虹 B-roll'],maps:'https://www.google.com/maps/search/?api=1&query=Dubai+Marina+Walk'},
{id:'d4-marmoom',day:4,num:1,time:'09:00',dur:'上午',lat:24.803,lng:55.2489,name:'Al Marmoom 沙漠保护区',en:'Al Marmoom Conservation Reserve',rating:'4.5',reviews:'197',tag:'Nature Reserve',image:img('Al%20Qudra%20Lakes%20at%20Al%20Marmoom%20Desert%20Conservation%20Reserve.jpg'),note:'清晨沙漠地景干净，野生鸟类、马场和湖区可以拍出和 Safari 不同的质感。',shots:['清晨沙漠地景 wide','野生鸟类长焦拍摄','马场或骆驼互动'],maps:'https://www.google.com/maps/search/?api=1&query=Al+Marmoom+Conservation+Reserve'},
{id:'d4-safari',day:4,num:2,time:'15:30',dur:'5小时',lat:24.92,lng:55.35,name:'沙漠 Safari 营地',en:'Desert Safari Camp',rating:'4.9',reviews:'含越沙丘',tag:'BBQ Camp',image:img('Sunset%20During%20Dubai%20Desert%20Safari.jpg'),note:'日落前后 30 分钟是全片高潮：沙丘逆光剪影、车内反应、篝火和 BBQ 都要多拍。',shots:['越沙丘车内 reaction 镜头','日落逆光沙丘剪影','篝火特写慢镜头','星空延时，如留到深夜'],maps:'https://maps.google.com/?cid=16570779477515805847',site:'https://www.desertsafarisdubai.com/'}
];
let current=1,active=null,map,line,markers=new Map();
const $=s=>document.querySelector(s), byDay=()=>places.filter(p=>p.day===current), key=(type,id,i='')=>'dubai-'+type+'-'+id+'-'+i;
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function setTone(){document.documentElement.style.setProperty('--tone',days[current].tone)}
function renderTabs(){tabs.innerHTML=Object.values(days).map(d=>`<button class='tab ${d.label.endsWith(current)?'active':''}' data-day='${d.label.slice(-1)}'>${d.label}<br><span>${esc(d.title.split(' - ')[0])}</span></button>`).join('');tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{current=+b.dataset.day;active=null;render()})}
function renderBrief(){const d=days[current];brief.innerHTML=`<b>${d.label}</b><h2>${esc(d.title)}</h2><p>${esc(d.route)}</p>`}
function shotDone(p,i){return localStorage.getItem(key('shot',p.id,i))==='1'}
function saved(p){return localStorage.getItem(key('script',p.id))||''}
function bindScripts(scope=document){scope.querySelectorAll('[data-script]').forEach(t=>{t.oninput=()=>{localStorage.setItem(key('script',t.dataset.script),t.value);document.querySelectorAll(`[data-script='${t.dataset.script}']`).forEach(x=>{if(x!==t)x.value=t.value});const s=t.parentElement.querySelector('.saved');if(s)s.textContent=t.value.trim()?'已自动保存在此浏览器':'输入后会自动保存在此浏览器'}})}
function renderCards(){cards.innerHTML=byDay().map(p=>`<article class='stop ${active===p.id?'active':''}' data-id='${p.id}'><div class='pin'>${p.num}</div><div><div class='meta'>${p.time} · ${p.dur}</div><h3>${esc(p.name)}</h3><div class='en'>${esc(p.en)}</div><div class='chips'><span class='chip'>★ ${p.rating}</span><span class='chip'>${esc(p.reviews)}</span><span class='chip'>${esc(p.tag)}</span></div><p class='note'>${esc(p.note)}</p><div class='shots'>${p.shots.map((x,i)=>`<label class='shot ${shotDone(p,i)?'done':''}'><input type='checkbox' data-stop='${p.id}' data-i='${i}' ${shotDone(p,i)?'checked':''}><span>${esc(x)}</span></label>`).join('')}</div><div class='script'><label>Vlog 口播备注</label><textarea data-script='${p.id}' placeholder='在这里写这一站的口播文案、转场句或临场提醒...'>${esc(saved(p))}</textarea><div class='saved'>${saved(p).trim()?'已自动保存在此浏览器':'输入后会自动保存在此浏览器'}</div></div><div class='links'><a class='link' target='_blank' rel='noreferrer' href='${p.maps}'>Google Maps</a>${p.site?`<a class='link' target='_blank' rel='noreferrer' href='${p.site}'>官网</a>`:''}</div></div></article>`).join('');
cards.querySelectorAll('.stop').forEach(c=>c.onclick=e=>{if(e.target.closest('a,input,textarea,label'))return;focus(c.dataset.id,true)});cards.querySelectorAll('.shot input').forEach(i=>i.onchange=()=>{localStorage.setItem(key('shot',i.dataset.stop,i.dataset.i),i.checked?'1':'0');i.closest('.shot').classList.toggle('done',i.checked)});bindScripts(cards)}
function icon(p){return L.divIcon({className:'',html:`<div class='marker' style='--tone:${days[p.day].tone}'><span>${p.num}</span></div>`,iconSize:[34,34],iconAnchor:[17,34]})}
function initMap(){map=L.map('map',{zoomControl:true}).setView([25.1972,55.2744],11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:19}).addTo(map);map.on('click',()=>{})}
function renderMap(){if(!map)return;markers.forEach(m=>m.remove());markers.clear();if(line)line.remove();const ps=byDay();ps.forEach(p=>{const m=L.marker([p.lat,p.lng],{icon:icon(p)}).addTo(map);m.on('click',()=>focus(p.id,true));markers.set(p.id,m)});if(ps.length>1)line=L.polyline(ps.map(p=>[p.lat,p.lng]),{color:days[current].tone,weight:4,opacity:.75,dashArray:'8 8'}).addTo(map);fit()}
function fit(){const ps=byDay();if(map&&ps.length)map.fitBounds(L.latLngBounds(ps.map(p=>[p.lat,p.lng])),{padding:[70,70],maxZoom:13})}
function fallback(el,p){el.onerror=null;el.src='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 900 520'><rect width='900' height='520' fill='${days[p.day].tone}'/><circle cx='720' cy='120' r='90' fill='#f3d18b'/><path d='M0 390c180-80 320-90 520-25s270 40 380 0v155H0z' fill='#f7e4bd'/><text x='54' y='110' fill='white' font-size='54' font-family='Arial' font-weight='700'>${esc(p.name)}</text></svg>`)}
function renderDetail(p){const ps=byDay(),i=ps.findIndex(x=>x.id===p.id),prev=ps[(i-1+ps.length)%ps.length],next=ps[(i+1)%ps.length];detail.classList.add('open');detail.innerHTML=`<div class='photo'><img src='${p.image}' alt='${esc(p.name)}'><button class='close' aria-label='关闭'>×</button></div><div class='body'><div class='meta'>${days[p.day].label} · ${p.time}</div><h3>${esc(p.name)}</h3><div class='rating'>${p.rating} ★ <span>(${esc(p.reviews)})</span><span>·</span><span>${esc(p.tag)}</span></div><section class='box'><b>Notes from Claude</b><p>${esc(p.note)}</p></section><div class='mini'><b>Shot List</b>${p.shots.slice(0,3).map(s=>`<span>${esc(s)}</span>`).join('')}</div><div class='script'><label>Vlog 口播备注</label><textarea data-script='${p.id}' placeholder='这里也可以写口播文案，会和左侧同步保存...'>${esc(saved(p))}</textarea><div class='saved'>${saved(p).trim()?'已自动保存在此浏览器':'输入后会自动保存在此浏览器'}</div></div><div class='links'><a class='link' target='_blank' rel='noreferrer' href='${p.maps}'>打开 Google Maps</a>${p.site?`<a class='link' target='_blank' rel='noreferrer' href='${p.site}'>官网</a>`:''}</div></div><footer class='nav'><button data-go='${prev.id}'>‹</button><div class='count'>${i+1} of ${ps.length}</div><button data-go='${next.id}'>›</button></footer>`;detail.querySelector('img').onerror=e=>fallback(e.currentTarget,p);detail.querySelector('.close').onclick=()=>{detail.classList.remove('open');active=null;renderCards()};detail.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>focus(b.dataset.go,true));bindScripts(detail)}
function focus(id,open){const p=places.find(x=>x.id===id);if(!p)return;active=id;current=p.day;setTone();renderTabs();renderBrief();renderCards();if(map){map.setView([p.lat,p.lng],15,{animate:true});setTimeout(()=>map.invalidateSize(),80)}if(open){renderDetail(p);document.body.classList.add('map-open');mobileMap.textContent='返回清单'}}
function render(){setTone();renderTabs();renderBrief();renderCards();renderMap();detail.classList.remove('open');document.body.classList.remove('map-open');mobileMap.textContent='查看地图';setTimeout(()=>map&&map.invalidateSize(),80)}
mobileMap.onclick=()=>{const open=document.body.classList.toggle('map-open');mobileMap.textContent=open?'返回清单':'查看地图';setTimeout(()=>map&&map.invalidateSize(),80)};
initMap();render();
</script>
</body>
</html>
